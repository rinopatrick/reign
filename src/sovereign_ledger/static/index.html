<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reign</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config = { darkMode: 'class' };
</script>
<style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors">
<div id="app" class="min-h-screen flex">
  <!-- Mobile sidebar overlay -->
  <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="w-64 bg-slate-900 text-white flex-shrink-0 flex flex-col fixed md:relative inset-y-0 left-0 transform -translate-x-full md:translate-x-0 transition-transform duration-200 z-50">
    <div class="p-6 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold tracking-tight">Reign</h1>
        <p class="text-xs text-slate-400 mt-1">Local-first finance</p>
      </div>
      <button onclick="toggleSidebar()" class="md:hidden text-slate-400 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <nav class="flex-1 px-4 space-y-1">
      <a href="#" onclick="navigate('dashboard')" id="nav-dashboard" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium bg-slate-800 text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
        Dashboard
      </a>
      <a href="#" onclick="navigate('transactions')" id="nav-transactions" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
        Transactions
      </a>
      <a href="#" onclick="navigate('accounts')" id="nav-accounts" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
        Accounts
      </a>
      <a href="#" onclick="navigate('budgets')" id="nav-budgets" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Budgets
      </a>
      <a href="#" onclick="navigate('categories')" id="nav-categories" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
        Categories
      </a>
      <a href="#" onclick="navigate('goals')" id="nav-goals" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        Goals
      </a>
      <a href="#" onclick="navigate('forecast')" id="nav-forecast" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Forecast
      </a>
      <a href="#" onclick="navigate('calendar')" id="nav-calendar" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Calendar
      </a>
      <a href="#" onclick="navigate('recurring')" id="nav-recurring" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Recurring
      </a>
    </nav>
    <div class="p-4 border-t border-slate-800 space-y-2">
      <button onclick="generateReport()" class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Export PDF
      </button>
      <button onclick="exportBackup()" class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm font-medium transition text-slate-300">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4-4m0 0l-4 4m4-4v12"/></svg>
        Backup Data
      </button>
      <label class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm font-medium transition text-slate-300 cursor-pointer">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        Restore Data
        <input type="file" accept=".json" class="hidden" onchange="importBackup(this)">
      </label>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-auto min-w-0">
    <header class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 px-4 md:px-6 py-4 flex items-center justify-between sticky top-0 z-10">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="md:hidden text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <h2 id="page-title" class="text-lg font-semibold">Dashboard</h2>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="toggleDarkMode()" id="dark-mode-btn" class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition" title="Toggle dark mode">
          <svg id="moon-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          <svg id="sun-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>
        <div class="text-sm text-gray-500 dark:text-gray-400" id="current-date"></div>
      </div>
    </header>
    <div id="content" class="p-4 md:p-6 max-w-6xl mx-auto"></div>
  </main>
</div>

<!-- Modal: Add Transaction -->
<div id="tx-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700 shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
    <div class="p-4 border-b dark:border-gray-700 flex items-center justify-between">
      <h3 class="text-sm font-semibold dark:text-gray-200">Add Transaction</h3>
      <button onclick="closeTxModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <form id="tx-form" onsubmit="saveTransaction(event)" class="p-4 space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-gray-500 dark:text-gray-400">Date</label>
          <input name="date" type="date" id="tx-date" class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2" required>
        </div>
        <div>
          <label class="text-xs text-gray-500 dark:text-gray-400">Amount</label>
          <input name="amount" type="number" step="0.01" placeholder="50000" class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2" required>
        </div>
      </div>
      <div>
        <label class="text-xs text-gray-500 dark:text-gray-400">Description</label>
        <input name="description" type="text" placeholder="e.g. Lunch at cafe" class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2" required>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-gray-500 dark:text-gray-400">Account</label>
          <select name="account_id" id="tx-account-select" class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2" required></select>
        </div>
        <div>
          <label class="text-xs text-gray-500 dark:text-gray-400">Category</label>
          <select name="category_id" id="tx-category-select" class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2"></select>
        </div>
      </div>
      <div>
        <label class="text-xs text-gray-500 dark:text-gray-400">Currency</label>
        <select name="currency" class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2">
          <option value="IDR">IDR</option>
          <option value="USD">USD</option>
          <option value="AUD">AUD</option>
        </select>
      </div>
      <div>
        <label class="text-xs text-gray-500 dark:text-gray-400">Notes</label>
        <textarea name="notes" rows="2" placeholder="Additional details..." class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2"></textarea>
      </div>
      <div>
        <label class="text-xs text-gray-500 dark:text-gray-400">Tags (comma separated)</label>
        <input name="tags" type="text" placeholder="e.g. work, travel, urgent" class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2">
      </div>
      <div class="flex items-center gap-2">
        <input type="checkbox" name="is_expense" id="tx-is-expense" checked class="rounded">
        <label for="tx-is-expense" class="text-sm dark:text-gray-300">This is an expense (negative amount)</label>
      </div>
      <!-- Templates -->
      <div id="tx-template-section" class="border-t dark:border-gray-700 pt-3">
        <div class="flex items-center justify-between mb-2">
          <label class="text-xs text-gray-500 dark:text-gray-400">Templates</label>
          <button type="button" onclick="saveAsTemplate()" class="text-xs text-blue-600 hover:underline">Save current as template</button>
        </div>
        <select id="tx-template-select" onchange="loadTemplate(this.value)" class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2">
          <option value="">-- Select a template --</option>
        </select>
      </div>
      <div class="flex gap-2 pt-2">
        <button type="submit" class="flex-1 px-4 py-2 bg-slate-900 text-white text-sm font-medium rounded-lg hover:bg-slate-800">Save</button>
        <button type="button" onclick="closeTxModal()" class="px-4 py-2 border dark:border-gray-600 dark:text-gray-200 text-sm rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: Bulk Edit -->
<div id="bulk-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700 shadow-xl w-full max-w-sm">
    <div class="p-4 border-b dark:border-gray-700 flex items-center justify-between">
      <h3 class="text-sm font-semibold dark:text-gray-200">Bulk Edit</h3>
      <button onclick="closeBulkModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="p-4 space-y-4">
      <div>
        <label class="text-xs text-gray-500 dark:text-gray-400">Change Category</label>
        <select id="bulk-category" class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2"></select>
      </div>
      <div>
        <label class="text-xs text-gray-500 dark:text-gray-400">Change Date</label>
        <input id="bulk-date" type="date" class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2">
      </div>
      <div class="flex gap-2">
        <button onclick="applyBulkEdit()" class="flex-1 px-4 py-2 bg-slate-900 text-white text-sm font-medium rounded-lg hover:bg-slate-800">Apply</button>
        <button onclick="closeBulkModal()" class="px-4 py-2 border dark:border-gray-600 dark:text-gray-200 text-sm rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Transfer -->
<div id="transfer-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700 shadow-xl w-full max-w-lg">
    <div class="p-4 border-b dark:border-gray-700 flex items-center justify-between">
      <h3 class="text-sm font-semibold dark:text-gray-200">Transfer Between Accounts</h3>
      <button onclick="closeTransferModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <form id="transfer-form" onsubmit="saveTransfer(event)" class="p-4 space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-gray-500 dark:text-gray-400">From Account</label>
          <select name="from_account_id" id="transfer-from-account" class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2" required></select>
        </div>
        <div>
          <label class="text-xs text-gray-500 dark:text-gray-400">To Account</label>
          <select name="to_account_id" id="transfer-to-account" class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2" required></select>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-gray-500 dark:text-gray-400">Date</label>
          <input name="date" type="date" id="transfer-date" class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2" required>
        </div>
        <div>
          <label class="text-xs text-gray-500 dark:text-gray-400">Amount</label>
          <input name="amount" type="number" step="0.01" placeholder="50000" class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2" required>
        </div>
      </div>
      <div>
        <label class="text-xs text-gray-500 dark:text-gray-400">Description</label>
        <input name="description" type="text" placeholder="e.g. Savings transfer" class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2">
      </div>
      <div>
        <label class="text-xs text-gray-500 dark:text-gray-400">Currency</label>
        <select name="currency" class="w-full text-sm border dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-lg px-3 py-2">
          <option value="IDR">IDR</option>
          <option value="USD">USD</option>
          <option value="AUD">AUD</option>
        </select>
      </div>
      <div class="flex gap-2 pt-2">
        <button type="submit" class="flex-1 px-4 py-2 bg-slate-900 text-white text-sm font-medium rounded-lg hover:bg-slate-800">Transfer</button>
        <button type="button" onclick="closeTransferModal()" class="px-4 py-2 border dark:border-gray-600 dark:text-gray-200 text-sm rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- Floating Quick Add Button -->
<button onclick="openTxModal()" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 hover:bg-blue-500 text-white rounded-full shadow-lg flex items-center justify-center transition z-40" title="Quick Add (Ctrl+N)">
  <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
</button>

<!-- Keyboard shortcut hint -->
<div id="shortcut-hint" class="fixed bottom-6 left-6 hidden md:block">
  <div class="bg-white/90 dark:bg-gray-800/90 backdrop-blur text-xs text-gray-500 dark:text-gray-400 px-3 py-2 rounded-lg shadow border dark:border-gray-700">
    <kbd class="font-mono bg-gray-100 dark:bg-gray-700 px-1 rounded">Ctrl</kbd>+<kbd class="font-mono bg-gray-100 dark:bg-gray-700 px-1 rounded">N</kbd> Add &nbsp;
    <kbd class="font-mono bg-gray-100 dark:bg-gray-700 px-1 rounded">/</kbd> Search &nbsp;
    <kbd class="font-mono bg-gray-100 dark:bg-gray-700 px-1 rounded">C</kbd> Calendar
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
